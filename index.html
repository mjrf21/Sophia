<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophia</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            color: white;
            font-size: clamp(1.5rem, 8vw, 3.5rem);
            text-align: center;
            padding: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            pointer-events: auto;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid white;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 50px;
            transition: all 0.3s ease;
            pointer-events: auto;
            position: absolute;
        }

        #btn-no {
            top: 65vh;
            left: calc(50% + 20px);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #btn-si {
            top: 65vh;
            left: calc(50% - 150px);
        }

        #btn-si:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px white;
            transform: scale(1.1);
        }

       
        #mensaje-final {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            display: none;
            z-index: 100;
            width: 80%; /* Para que no se pegue a los bordes */
            max-width: 800px;
            word-wrap: break-word; /* Rompe el enlace si es muy largo */
        }

        #mensaje-final h2 {
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff00ea;
        }

        #mensaje-final a {
            color: #00d2ff;
            font-size: 1.1rem;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            transition: all 0.3s;
            border: 1px dashed #ff00ea;
            cursor: pointer;
        }

        #mensaje-final a:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: 0 0 15px #ff00ea;
        }
    </style>
</head>
<body>

    <canvas id="skyCanvas"></canvas>

    <div id="mensaje-final">
        <h2>♡</h2>
        <p style="color: #ccc; margin-bottom: 10px;">Haz clic en el enlace para copiarlo:</p>
        <a id="enlace-drive" onclick="copiarEnlace()">https://drive.google.com/drive/folders/1VSeEAHMDV0QXOEe6Vbh5RWEbJCbMJVqy?usp=drive_link</a>
        <p id="confirmacion" style="color: #ff00ea; font-size: 0.9rem; margin-top: 10px; opacity: 0;">¡Copiado al portapapeles!</p>
    </div>

    <div class="ui-layer" id="main-ui">
        <h1 id="titulo">¿Quieres ser mi novia?</h1>
        <button id="btn-si" class="btn">SÍ</button>
        <button id="btn-no" class="btn">NO</button>
    </div>

    <script>
        const canvas = document.getElementById('skyCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        const mouse = { x: 0, y: 0 };

        function setCanvasSize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        function Star() {
            this.reset();
        }

        Star.prototype.reset = function() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.size = Math.random() * 2;
            this.alpha = Math.random();
            this.alphaSpeed = Math.random() * 0.02 + 0.005;
            this.depthFactor = Math.random() * 0.15;
            this.color = "255, 255, 255";
        }

        Star.prototype.update = function() {
            this.alpha += this.alphaSpeed;
            if (this.alpha > 1 || this.alpha < 0) this.alphaSpeed = -this.alphaSpeed;
            
            const moveX = (mouse.x - width / 2) * this.depthFactor;
            const moveY = (mouse.y - height / 2) * this.depthFactor;

            ctx.beginPath();
            ctx.fillStyle = `rgba(${this.color}, ${Math.max(0, this.alpha)})`;
            ctx.arc(this.x + moveX, this.y + moveY, this.size, 0, Math.PI * 2);
            ctx.fill();
        };

        for (let i = 0; i < 250; i++) stars.push(new Star());

        function animate() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, width, height);
            stars.forEach(s => s.update());
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        const btnNo = document.getElementById('btn-no');
        btnNo.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 40) + 20;
            btnNo.style.left = `${x}px`;
            btnNo.style.top = `${y}px`;
        });

        const btnSi = document.getElementById('btn-si');
        btnSi.addEventListener('click', () => {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('mensaje-final').style.display = 'block';
            
            stars.forEach(s => {
                s.color = "255, 100, 200"; 
                s.size += 1;
            });
        });

      
        function copiarEnlace() {
            const enlace = document.getElementById('enlace-drive').innerText;
            navigator.clipboard.writeText(enlace).then(() => {
                const conf = document.getElementById('confirmacion');
                conf.style.opacity = "1";
                setTimeout(() => conf.style.opacity = "0", 2000);
            });
        }
    </script>
</body>
</html>
